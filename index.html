```html
<!DOCTYPE html>
<html>
<head>
<title>Game World</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* Body */
body{
background:#111;
color:white;
}

/* Navbar */
nav{
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
padding:15px 40px;
}

nav h2{
color:#00eaff;
}

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin-left:20px;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:16px;
}

nav ul li a:hover{
color:#00eaff;
}

/* Hero Section */
.hero{
text-align:center;
padding:100px 20px;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1511512578047-dfb367046420");
background-size:cover;
}

.hero h1{
font-size:50px;
margin-bottom:15px;
}

.hero p{
font-size:20px;
margin-bottom:20px;
}

.hero button{
padding:12px 25px;
border:none;
background:#00eaff;
color:black;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

.hero button:hover{
background:#00bcd4;
}

/* Game Section */
.games{
padding:40px;
text-align:center;
}

.games h2{
margin-bottom:30px;
font-size:32px;
}

.game-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
}

.game-card{
background:#1c1c1c;
width:220px;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.game-card:hover{
transform:scale(1.05);
}

.game-card img{
width:100%;
height:140px;
object-fit:cover;
}

.game-card h3{
padding:15px;
}

/* Footer */
footer{
text-align:center;
padding:20px;
background:#000;
margin-top:30px;
}

</style>

</head>

<body>

<nav>
<h2>GameWorld</h2>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Games</a></li>
<li><a href="#">News</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<div class="hero">
<h1>Welcome to Game World</h1>
<p>Play the best games online</p>
<button>Start Playing</button>
</div>

<section class="games">
<h2>Popular Games</h2>

<div class="game-container">

<div class="game-card">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
<h3>Battle Arena</h3>
</div>

<div class="game-card">
<img src="https://images.unsplash.com/photo-1605902711622-cfb43c4437d1">
<h3>Speed Racer</h3>
</div>

<div class="game-card">
<img src="https://images.unsplash.com/photo-1580327332925-a10e6cb11baa">
<h3>Space Shooter</h3>
</div>

<div class="game-card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
<h3>Zombie War</h3>
</div>

</div>
</section>

<footer>
<p>© 2026 GameWorld | All Rights Reserved</p>
</footer>

</body>
</html>
